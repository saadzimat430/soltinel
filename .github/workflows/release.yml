name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write   # create GitHub release
  id-token: write   # npm provenance attestation

jobs:
  # ── 1. Quality gate ─────────────────────────────────────────────────────────
  quality:
    name: Typecheck, audit & unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Security audit (fail on high/critical)
        run: npm audit --audit-level=high

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm run test:unit

  # ── 2. Integration tests ────────────────────────────────────────────────────
  integration:
    name: Integration tests
    needs: quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Integration tests
        run: npm run test:integration

  # ── 3. Build + publish + GitHub release ─────────────────────────────────────
  publish:
    name: Publish to npm & create GitHub release
    needs: integration
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          registry-url: https://registry.npmjs.org

      - run: npm ci

      - name: Build
        run: npm run build

      - name: Smoke-test CLI
        run: node bin/soltinel.mjs --version && node bin/soltinel.mjs --help

      - name: Assert package.json version matches tag
        run: |
          PKG_VERSION="v$(node -p "require('./package.json').version")"
          TAG_VERSION="${GITHUB_REF_NAME}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::Tag $TAG_VERSION does not match package.json version $PKG_VERSION"
            exit 1
          fi

      - name: Publish to npm
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          make_latest: true
